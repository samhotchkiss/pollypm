api_version = "1"
name = "core_rail_items"
kind = "rail"
version = "0.1.0"
entrypoint = "plugin.py:plugin"
description = "Built-in cockpit rail items — Polly, Russell, Inbox, Projects, Settings. Registers through the Rail API introduced in er01 so external plugins can slot alongside."
